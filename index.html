<!DOCTYPE html>
<html>
  <head>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
    <title>AR体験</title>
  <body>
    <h1>スマートフォンを使用する場合、<br>画面を横にしてください。</h1>
    <model-viewer 
      src="./model.glb"
      ar
      ar-modes="scene-viewer webxr quick-look"
      auto-rotate
      camera-controls
      background-color="#ffffff"
      style="width: 100%; height: 100vh;">
    </model-viewer>
  </body>
          <h2　font size=”50”>ARビュー</h2>
  <br>
<p　div align=”right”>画面端の極小アイコンからAR体験できます</p>
</html>
